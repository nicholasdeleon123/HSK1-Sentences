<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HSK 1 句子">
<meta name="theme-color" content="#0f0f0f">
<title>HSK 1 Sentence Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;
  --border:rgba(255,255,255,0.09);--text:#f0ece4;
  --muted:rgba(240,236,228,0.45);--hint:rgba(240,236,228,0.22);
  --accent:#c8a96e;--green:#5fbe8a;--green-dim:rgba(95,190,138,0.13);
  --red:#e06868;--red-dim:rgba(224,104,104,0.13);--blue:#6ba3d6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;height:100dvh;
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  overflow:hidden;touch-action:manipulation;
  -webkit-text-size-adjust:100%;
}
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}

/* ── HEADER ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(env(safe-area-inset-top,0px) + 10px) 18px 8px;
  flex-shrink:0;
}
.header-title{font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.score{font-size:13px;color:var(--muted)}
.score span{font-weight:500;color:var(--text)}
.progress-track{height:3px;background:var(--border);flex-shrink:0}
.progress-fill{height:100%;background:var(--accent);transition:width .5s ease;border-radius:0 3px 3px 0}

/* ── CONTENT ── */
.content{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 16px 6px;
  display:flex;flex-direction:column;gap:10px;min-height:0;
}
.sentence-num{font-size:11px;color:var(--hint);letter-spacing:.06em;padding-left:2px}

/* Prompt card */
.prompt-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:18px 18px 16px;
}
.prompt-label{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-weight:500}
.prompt-text{font-size:19px;line-height:1.6;color:var(--text);font-weight:400}

/* Answer card */
.answer-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:18px;padding:14px 16px;min-height:76px;position:relative;
  transition:border-color .2s;
}
.answer-card.focused{border-color:rgba(200,169,110,.35)}
.answer-label{font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-weight:500}
.answer-text{
  font-family:'Noto Serif SC',serif;font-size:26px;line-height:1.4;
  color:var(--text);min-height:38px;letter-spacing:.04em;word-break:break-all;
}
.answer-text .cursor{animation:blink 1s step-end infinite;color:var(--accent);font-weight:200}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.hint-btn{
  position:absolute;top:14px;right:14px;
  font-size:12px;color:var(--muted);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:5px 10px;cursor:pointer;
  min-height:32px;display:flex;align-items:center;
}
.hint-btn:active{color:var(--accent)}

/* Feedback */
.feedback-card{border-radius:16px;padding:14px 16px;line-height:1.5;display:none}
.feedback-card.correct{background:var(--green-dim);border:1px solid rgba(95,190,138,.3);color:var(--green)}
.feedback-card.wrong{background:var(--red-dim);border:1px solid rgba(224,104,104,.3);color:var(--text)}
.feedback-card .fb-label{font-size:15px;font-weight:500;margin-bottom:8px}
.feedback-card .fb-answer{font-family:'Noto Serif SC',serif;font-size:18px;color:var(--text);line-height:1.6}
.feedback-card .fb-alt{font-size:12px;color:var(--muted);margin-top:6px}
.fb-answer-row{display:flex;align-items:center;gap:10px}
.fb-speak-btn{
  flex-shrink:0;width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s,transform .1s;color:var(--muted);
}
.fb-speak-btn:active{transform:scale(.9)}
.fb-speak-btn.speaking{color:var(--accent);border-color:rgba(200,169,110,.4);background:rgba(200,169,110,.1)}
.fb-speak-btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}

/* ── IME AREA (thumb zone) ── */
.ime-area{
  flex-shrink:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:8px 12px calc(env(safe-area-inset-bottom,0px) + 8px);
}

/* Candidate bar */
.candidates{
  display:flex;gap:7px;overflow-x:auto;
  padding:2px 0 10px;min-height:58px;
  scrollbar-width:none;align-items:center;
}
.candidates::-webkit-scrollbar{display:none}
.cand-btn{
  flex-shrink:0;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;
  min-width:48px;height:52px;
  display:flex;align-items:center;justify-content:center;
  padding:0 14px;
  cursor:pointer;transition:background .1s,transform .08s;
  -webkit-user-select:none;user-select:none;
}
.cand-btn:active{background:var(--surface3);transform:scale(.94)}
.cand-char{font-family:'Noto Serif SC',serif;font-size:22px;color:var(--text);line-height:1}
.cand-placeholder{font-size:12px;color:var(--hint);padding:4px;align-self:center}

/* Input row */
.input-row{display:flex;gap:8px;margin-bottom:8px}
.pinyin-input{
  flex:1;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:14px;
  padding:0 16px;height:48px;
  font-size:16px;color:var(--text);
  font-family:'DM Sans',sans-serif;outline:none;
  -webkit-appearance:none;appearance:none;
}
.pinyin-input::placeholder{color:var(--hint)}
.pinyin-input:focus{border-color:rgba(200,169,110,.4)}
.back-btn{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:14px;width:52px;height:48px;
  font-size:19px;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.back-btn:active{background:var(--surface3)}

/* Action row */
.action-row{display:flex;gap:7px}
.punct-btn{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;height:48px;
  font-size:18px;cursor:pointer;color:var(--muted);
  font-family:'Noto Serif SC',serif;
  flex:1;display:flex;align-items:center;justify-content:center;
  transition:background .1s;-webkit-user-select:none;user-select:none;
}
.punct-btn:active{background:var(--surface3)}
.check-btn{
  flex:3;height:48px;
  background:rgba(95,190,138,.2);
  border:1.5px solid rgba(95,190,138,.45);
  border-radius:12px;
  font-size:15px;font-weight:600;cursor:pointer;
  color:var(--green);font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .1s;-webkit-user-select:none;user-select:none;
}
.check-btn:active{background:rgba(95,190,138,.35)}
.skip-btn{
  flex:1.4;height:48px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;
  font-size:13px;cursor:pointer;color:var(--muted);
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;
}
.skip-btn:active{background:var(--surface3)}

/* Next button (replaces next-bar) */
.next-bar{
  flex-shrink:0;
  padding:8px 12px calc(env(safe-area-inset-bottom,0px) + 8px);
  background:var(--surface);border-top:1px solid var(--border);
  display:none;
}
.next-btn{
  width:100%;height:52px;border-radius:16px;
  border:none;
  background:var(--accent);color:#1a1200;
  font-size:16px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity .15s;
}
.next-btn:active{opacity:.85}

/* Pinyin annotation */
.py-word{display:inline-flex;flex-direction:column;align-items:center;margin:0 2px;vertical-align:bottom}
.py-char{font-family:'Noto Serif SC',serif;font-size:22px;line-height:1.2;color:var(--text)}
.py-text{font-size:11px;color:var(--accent);line-height:1.3;white-space:nowrap;font-family:'DM Sans',sans-serif}
.feedback-card .fb-answer{font-size:18px;line-height:1.2}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-title">HSK 1 · 句子练习</div>
    <div class="header-right">
      <div class="score">✓ <span id="sr">0</span> &nbsp; ✗ <span id="sw">0</span></div>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div class="content" id="content">
    <div class="sentence-num" id="snum">Sentence 1 / —</div>

    <div class="prompt-card">
      <div class="prompt-label">Translate into Chinese</div>
      <div class="prompt-text" id="prompt">Loading...</div>
    </div>

    <div class="answer-card">
      <div class="answer-label">Your answer</div>
      <div class="answer-text" id="answer-display"><span class="cursor">|</span></div>
      <button class="hint-btn" id="hint-btn" onclick="showHint()">Hint</button>
    </div>

    <div class="feedback-card" id="feedback">
      <div class="fb-label" id="fb-label"></div>
      <div class="fb-answer-row">
        <div class="fb-answer" id="fb-answer"></div>
        <button class="fb-speak-btn" id="fb-speak-btn" aria-label="Read aloud" onclick="speakAnswer()">
          <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
      </div>
      <div class="fb-alt" id="fb-alt"></div>
    </div>
  </div>

  <div class="ime-area" id="ime-area">
    <div class="candidates" id="candidates">
      <span class="cand-placeholder">Type pinyin below to see characters</span>
    </div>
    <div class="input-row">
      <input class="pinyin-input" id="pinyin-input" type="text"
        placeholder="type pinyin…" autocomplete="off" autocorrect="off"
        autocapitalize="none" spellcheck="false">
      <button class="back-btn" onclick="doBackspace()">⌫</button>
    </div>
    <div class="action-row">
      <button class="punct-btn" onclick="addChar('。')">。</button>
      <button class="punct-btn" onclick="addChar('，')">，</button>
      <button class="punct-btn" onclick="addChar('？')">？</button>
      <button class="punct-btn" onclick="addChar('！')">！</button>
      <button class="check-btn" onclick="checkAnswer()">Check ✓</button>
      <button class="skip-btn" onclick="skipSentence()">Skip</button>
    </div>
  </div>

  <div class="next-bar" id="next-bar">
    <button class="next-btn" onclick="nextSentence()">Next sentence &nbsp;→</button>
  </div>
</div>

["今天","jīntiān"],["九","jiǔ"],["觉得","juéde"],["开","kāi"],["开车","kāichē"],

["妹妹","mèimei"],["们","men"],["米饭","mǐfàn"],["面包","miànbāo"],
["面条儿","miàntiáor"],["明年","míngnián"],["明天","míngtiān"],["名字","míngzi"],
["哪","nǎ"],["哪个","nǎge"],["哪里","nǎlǐ"],["哪儿","nǎr"],["哪些","nǎxiē"],

// ============================================================
// PINYIN IME
// ============================================================
function stripTones(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,'');
}

const pinyinIndex={};
HSK1.forEach(([char,py])=>{
  const key=stripTones(py);
  if(!pinyinIndex[key]) pinyinIndex[key]=[];
  pinyinIndex[key].push({char,py});
});

function getCandidates(input){
  if(!input) return [];
  const q=input.toLowerCase().replace(/\s/g,'');
  const matches=[];
  Object.entries(pinyinIndex).forEach(([key,words])=>{
    if(key.startsWith(q)){
      const exact=(key.length===q.length)?0:1;
      words.forEach(w=>matches.push({...w,key,priority:exact*100+key.length}));
    }
  });
  matches.sort((a,b)=>a.priority-b.priority||a.char.length-b.char.length);
  const seen=new Set();
  return matches.filter(m=>{
    if(seen.has(m.char)) return false;
    seen.add(m.char); return true;
  }).slice(0,12);
}

// ============================================================
// SENTENCE BANK (1000+ sentences using only HSK1 vocabulary)
// ============================================================
function buildSentences(){
  const S=[];
  const add=(en,zh)=>S.push({en,zh:Array.isArray(zh)?zh:[zh]});
  const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);

  // Vocabulary groups
  const F=[['米饭','rice'],['面条儿','noodles'],['包子','steamed buns'],
    ['饺子','dumplings'],['面包','bread'],['苹果','apples'],
    ['水果','fruit'],['鸡蛋','eggs'],['菜','vegetables']];

// ============================================================
// SPEECH
// ============================================================
let zhVoice=null;
function loadVoices(){
  const voices=speechSynthesis.getVoices();
  zhVoice=voices.find(v=>v.lang==='zh-TW')
         ||voices.find(v=>v.lang==='zh-CN')
         ||voices.find(v=>v.lang.startsWith('zh'))
         ||null;
}
loadVoices();
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=loadVoices;

function speakAnswer(){
  if(!window.speechSynthesis||!currentAnswerText) return;
  speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(currentAnswerText);
  utt.lang='zh-CN'; utt.rate=0.85;
  if(zhVoice) utt.voice=zhVoice;
  const btn=document.getElementById('fb-speak-btn');
  btn.classList.add('speaking');
  utt.onend=()=>btn.classList.remove('speaking');
  utt.onerror=()=>btn.classList.remove('speaking');
  speechSynthesis.speak(utt);
}

// ============================================================
// APP STATE
// ============================================================
const STORAGE_KEY='hsk1_sentences_v1';
let sentences=[], shuffled=[], current=0, userAnswer='', checked=false, currentAnswerText='';
let score={r:0,w:0};

function saveScore(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(score));}catch(e){}
}
function loadScore(){
  try{
    const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
    if(s&&typeof s.r==='number') score=s;
  }catch(e){}
}

function shuffle(a){
  const r=[...a];
  for(let i=r.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [r[i],r[j]]=[r[j],r[i]];
  }
  return r;
}

function norm(s){
  return s.replace(/[。，？！、…,.?!\s]/g,'');
}

const charPinyinMap={};
HSK1.forEach(([char,py])=>{ charPinyinMap[char]=py; });

function getAnnotatedParts(sentence){
  const clean=sentence.replace(/[。，？！、…\s]/g,'');
  const chars=[...clean];
  const parts=[];
  let i=0;
  while(i<chars.length){
    let matched=false;
    for(let len=Math.min(5,chars.length-i);len>=1;len--){
      const sub=chars.slice(i,i+len).join('');
      if(charPinyinMap[sub]){
        parts.push({char:sub,py:charPinyinMap[sub]});
        i+=len;matched=true;break;
      }
    }
    if(!matched){parts.push({char:chars[i],py:''});i++;}
  }
  return parts;
}

function renderWithPinyin(sentence){
  return getAnnotatedParts(sentence).map(({char,py})=>
    `<span class="py-word"><span class="py-char">${char}</span><span class="py-text">${py}</span></span>`
  ).join('');
}

// ============================================================
// UI FUNCTIONS
// ============================================================
const input=document.getElementById('pinyin-input');

function updateCandidates(){
  const q=input.value;
  const cands=getCandidates(q);
  const box=document.getElementById('candidates');
  if(!q||cands.length===0){
    box.innerHTML='<span class="cand-placeholder">'+(q?'No matches':'Type pinyin below to see characters')+'</span>';
    return;
  }
  box.innerHTML=cands.map(({char,py})=>
    `<button class="cand-btn" onclick="selectCandidate('${char.replace(/'/g,"\\'")}')">
      <span class="cand-char">${char}</span>
    </button>`
  ).join('');
}

function selectCandidate(char){
  userAnswer+=char;
  renderAnswer();
  input.value='';
  updateCandidates();
  input.focus();
}

function addChar(c){
  userAnswer+=c;
  renderAnswer();
}

function doBackspace(){
  if(input.value){
    input.value=input.value.slice(0,-1);
    updateCandidates();
  } else if(userAnswer){
    // Remove last character (handles multi-byte Chinese correctly)
    userAnswer=[...userAnswer].slice(0,-1).join('');
    renderAnswer();
  }
  input.focus();
}

function renderAnswer(){
  const el=document.getElementById('answer-display');
  if(checked){
    el.innerHTML=`<span style="font-family:'Noto Serif SC',serif">${userAnswer}</span>`;
  } else {
    el.innerHTML=`<span style="font-family:'Noto Serif SC',serif">${userAnswer}</span><span class="cursor">|</span>`;
  }
}

function showSentence(){
  speechSynthesis.cancel();
  const btn=document.getElementById('fb-speak-btn');
  if(btn) btn.classList.remove('speaking');
  const s=sentences[shuffled[current]];
  document.getElementById('snum').textContent=`Sentence ${current+1} / ${shuffled.length}`;
  document.getElementById('prompt').textContent=s.en;
  document.getElementById('prog').style.width=((current+1)/shuffled.length*100)+'%';
  document.getElementById('sr').textContent=score.r;
  document.getElementById('sw').textContent=score.w;
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-bar').style.display='none';
  document.getElementById('hint-btn').textContent='Hint';
  userAnswer=''; checked=false;
  renderAnswer();
  input.value='';
  updateCandidates();
  document.getElementById('content').scrollTop=0;
}

function showHint(){
  const s=sentences[shuffled[current]];
  const first=[...s.zh[0]].slice(0,2).join('');
  document.getElementById('hint-btn').textContent='Starts: '+first+'…';
}

function checkAnswer(){
  if(!userAnswer.trim()) return;
  checked=true;
  const s=sentences[shuffled[current]];
  const u=norm(userAnswer);
  const correct=s.zh.some(a=>norm(a)===u);
  const fb=document.getElementById('feedback');
  const fbl=document.getElementById('fb-label');
  const fba=document.getElementById('fb-answer');
  const fbalt=document.getElementById('fb-alt');
  // Store plain Chinese characters only — no punctuation, no pinyin — for speech
  currentAnswerText=s.zh[0].replace(/[。，？！、…\s]/g,'');

  if(correct){
    score.r++;
    fb.className='feedback-card correct';
    fbl.textContent='✓ Correct!';
    fba.textContent=s.zh[0];
    fbalt.textContent=s.zh.length>1?'Also accepted: '+s.zh.slice(1).join(' / '):'';
    if(navigator.vibrate) navigator.vibrate(40);
  } else {
    score.w++;
    fb.className='feedback-card wrong';
    fbl.textContent='✗ Correct answer:';
    fba.innerHTML=renderWithPinyin(s.zh[0]);
    fbalt.textContent=s.zh.length>1?'Also accepted: '+s.zh.slice(1).join(' / '):'';
    if(navigator.vibrate) navigator.vibrate([60,40,60]);
  }
  fb.style.display='block';
  saveScore();
  document.getElementById('sr').textContent=score.r;
  document.getElementById('sw').textContent=score.w;
  document.getElementById('next-bar').style.display='block';
  renderAnswer();
  // Hide IME area, show next button cleanly
  document.getElementById('ime-area').style.display='none';
  // Scroll feedback into view
  setTimeout(()=>fb.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
}

function nextSentence(){
  document.getElementById('ime-area').style.display='';
  current=(current+1)%shuffled.length;
  if(current===0) shuffled=shuffle([...Array(sentences.length).keys()]);
  showSentence();
}

function skipSentence(){
  nextSentence();
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown',e=>{
  if(e.target===input) return; // let input handle its own keys
  if(e.key==='Enter'&&!checked) checkAnswer();
  if(e.key==='Enter'&&checked) nextSentence();
  if(e.key==='Backspace') doBackspace();
});

input.addEventListener('input',updateCandidates);
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    const cands=getCandidates(input.value);
    if(cands.length>0){selectCandidate(cands[0].char);}
    else if(!input.value&&!checked){checkAnswer();}
  }
  if(e.key===' '&&input.value){
    e.preventDefault();
    const cands=getCandidates(input.value);
    if(cands.length>0) selectCandidate(cands[0].char);
  }
});

loadScore();
sentences=buildSentences();
// De-duplicate by exact English prompt
const seen=new Set();
sentences=sentences.filter(s=>{
  if(seen.has(s.en)) return false;
  seen.add(s.en); return true;
});
shuffled=shuffle([...Array(sentences.length).keys()]);
console.log(`Loaded ${sentences.length} sentences`);
showSentence();
